services:
  app:
    build: .
    ports:
      - "8080:80"
    depends_on:
      - api
    restart: unless-stopped
  api:
    build: ./server
    expose:
      - "3001"
    environment:
      SQLITE_PATH: /data/monday.sqlite
    volumes:
      - monday-data:/data
    restart: unless-stopped

volumes:
  monday-data:
