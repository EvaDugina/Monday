services:
  app:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.app
    ports:
      - "${APP_PORT:-8080}:8080"
    depends_on:
      - api
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8080/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  api:
    build:
      context: ../server
      dockerfile: ../deploy/Dockerfile.api
    ports:
      - "${API_PORT:-3001}:3001"
    environment:
      DEBUG: "true"
      NODE_ENV: development
      PORT: 3001
      SQLITE_PATH: /data/monday.sqlite
    volumes:
      - monday-data:/data
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3001/api/health/ready').then((response)=>process.exit(response.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  monday-data:
